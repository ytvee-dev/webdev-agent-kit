interface:
    display_name: 'Pattern Library Manager'
    short_description: 'Maintain reusable pattern rules'
    default_prompt: 'Use $pattern-library-manager to add or tighten reusable approved patterns and anti-patterns, include small bad and good examples, update graph links and evals, and validate the bundle.'
policy:
    allow_implicit_invocation: true
dependencies:
    tools:
        - type: 'mcp'
          value: 'filesystem_server'
          description: 'Read and update selected common rules, anti-pattern templates, evals, and bundle metadata.'
        - type: 'mcp'
          value: 'openaiDeveloperDocs'
          description: 'Verify current Codex skill and metadata behavior when pattern changes affect skill authoring or packaging.'
