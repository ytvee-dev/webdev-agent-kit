interface:
    display_name: 'MCP Toolchain Manager'
    short_description: 'Manage MCP tool capabilities'
    default_prompt: 'Use $mcp-toolchain-manager to detect required MCP/tools, report missing capabilities, verify official install sources, request approval before installation, and update project/mcp-profile.md when durable tool state is needed.'
policy:
    allow_implicit_invocation: true
dependencies:
    tools:
        - type: 'mcp'
          value: 'filesystem_server'
          description: 'Read selected skill metadata and write project/mcp-profile.md only when durable MCP/tool state is needed.'
        - type: 'mcp'
          value: 'openaiDeveloperDocs'
          description: 'Verify current Codex, skills, plugins, and MCP documentation when toolchain setup depends on OpenAI behavior.'
