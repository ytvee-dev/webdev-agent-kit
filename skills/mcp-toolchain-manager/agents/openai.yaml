interface:
    display_name: 'MCP Toolchain Manager'
    short_description: 'Manage tool capabilities'
    default_prompt: 'Use $mcp-toolchain-manager to detect required tool capabilities, map them to available MCP/native providers, report missing capabilities, verify official install sources, request approval before installation, and update project/mcp-profile.md when durable tool state is needed.'
policy:
    allow_implicit_invocation: true
dependencies:
    tools:
        - type: 'mcp'
          value: 'filesystem_server'
          description: 'Satisfy the project_files capability by reading selected skill metadata, the portable capability manifest, and project/mcp-profile.md only when durable MCP/tool state is needed.'
        - type: 'mcp'
          value: 'openaiDeveloperDocs'
          description: 'Satisfy the codex_platform_docs capability when toolchain setup depends on current Codex, skills, plugins, config, or MCP behavior.'
