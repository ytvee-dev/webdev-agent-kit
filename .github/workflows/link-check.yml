name: link-check

on:
  pull_request:
  push:
    branches:
      - main
      - updates
      - 'audit/**'
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  links:
    name: Check Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check local Markdown links
        run: python scripts/check_links.py

      - name: Check external Markdown links
        if: github.event_name == 'schedule'
        run: python scripts/check_links.py --external --timeout 15
