name: quality-ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'audit/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Markdown, YAML, and Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff yamllint
          npm install --global markdownlint-cli2

      - name: Ruff lint
        run: ruff check scripts skills/agent-rules-skill-author/scripts

      - name: Ruff format check
        run: ruff format --check scripts skills/agent-rules-skill-author/scripts

      - name: YAML lint
        run: yamllint .github .codex-plugin skills/*/agents

      - name: Markdown lint
        run: markdownlint-cli2
