name: quality-ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'audit/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Markdown, YAML, and Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff yamllint
          npm install --global markdownlint-cli2

      - name: Ruff lint
        run: |
          set -o pipefail
          ruff check scripts skills/agent-rules-skill-author/scripts 2>&1 | tee ruff-lint.log

      - name: Ruff format check
        run: |
          set -o pipefail
          ruff format --diff scripts skills/agent-rules-skill-author/scripts 2>&1 | tee ruff-format.log

      - name: YAML lint
        run: |
          set -o pipefail
          yamllint .github .codex-plugin skills/*/agents 2>&1 | tee yamllint.log

      - name: Markdown lint report
        if: always()
        run: |
          set +e
          markdownlint-cli2 > markdownlint.log 2>&1
          cat markdownlint.log
          exit 0

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-lint-logs
          path: |
            ruff-lint.log
            ruff-format.log
            yamllint.log
            markdownlint.log
