name: quality-ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'audit/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Markdown, YAML, and Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff yamllint
          npm install --global markdownlint-cli2

      - name: Ruff correctness gate
        run: ruff check --select E9,F scripts skills/agent-rules-skill-author/scripts

      - name: Ruff full lint report
        if: always()
        run: |
          set +e
          ruff check scripts skills/agent-rules-skill-author/scripts > ruff-lint.log 2>&1
          cat ruff-lint.log
          exit 0

      - name: Ruff format report
        if: always()
        run: |
          set +e
          ruff format --check scripts skills/agent-rules-skill-author/scripts > ruff-format.log 2>&1
          cat ruff-format.log
          exit 0

      - name: YAML lint report
        if: always()
        run: |
          set +e
          yamllint .github .codex-plugin skills/*/agents > yamllint.log 2>&1
          cat yamllint.log
          exit 0

      - name: Markdown lint report
        if: always()
        run: |
          set +e
          markdownlint-cli2 > markdownlint.log 2>&1
          cat markdownlint.log
          exit 0

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-lint-logs
          path: |
            ruff-lint.log
            ruff-format.log
            yamllint.log
            markdownlint.log
