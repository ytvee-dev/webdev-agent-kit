name: skill-pack-ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'audit/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate source and portable targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Compile Python validators
        run: |
          python -m py_compile scripts/*.py
          python -m py_compile skills/agent-rules-skill-author/scripts/*.py

      - name: Validate source bundle and generated targets
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/validate_skill_pack.py 2>&1 | tee artifacts/validate_skill_pack.log

      - name: Record generated target inventory
        if: always()
        run: |
          mkdir -p artifacts
          {
            echo '# Generated target inventory'
            echo
            if [ -d dist ]; then
              find dist -maxdepth 4 -type f | sort
            else
              echo 'dist/ was not generated.'
            fi
          } > artifacts/generated-target-inventory.md

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-pack-validation-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            artifacts/**
            dist/**
