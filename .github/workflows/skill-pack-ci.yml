name: skill-pack-ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'audit/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate source and portable targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python validators
        run: |
          python -m py_compile scripts/*.py
          python -m py_compile skills/agent-rules-skill-author/scripts/*.py

      - name: Validate schemas
        id: validate_schemas
        run: |
          set +e
          python scripts/validate_schemas.py --strict-graph > validation-schemas.log 2>&1
          status=$?
          cat validation-schemas.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload schema validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-schemas-log
          path: validation-schemas.log

      - name: Fail if schema validation failed
        if: steps.validate_schemas.outputs.status != '0'
        run: exit ${{ steps.validate_schemas.outputs.status }}

      - name: Validate runtime target contracts
        run: python scripts/validate_target_contracts.py

      - name: Validate tool capability metadata
        run: python scripts/validate_tool_capabilities.py

      - name: Validate source context budgets
        run: python scripts/validate_context_budgets.py

      - name: Validate policy precedence
        run: python scripts/validate_policy_precedence.py

      - name: Validate test policy
        run: python scripts/validate_test_policy.py

      - name: Validate runtime policy layers
        run: python scripts/validate_runtime_layers.py

      - name: Validate README boundary
        id: validate_readme_boundary
        run: |
          set +e
          python scripts/check_readme_boundary.py > validation-readme-boundary.log 2>&1
          status=$?
          cat validation-readme-boundary.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload README boundary log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-readme-boundary-log
          path: validation-readme-boundary.log

      - name: Fail if README boundary failed
        if: steps.validate_readme_boundary.outputs.status != '0'
        run: exit ${{ steps.validate_readme_boundary.outputs.status }}

      - name: Validate source bundle
        id: validate_source
        run: |
          set +e
          python scripts/validate_source_bundle.py > validation-source.log 2>&1
          status=$?
          cat validation-source.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload source validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-source-log
          path: validation-source.log

      - name: Fail if source validation failed
        if: steps.validate_source.outputs.status != '0'
        run: exit ${{ steps.validate_source.outputs.status }}

      - name: Validate skill evals
        id: validate_evals
        run: |
          set +e
          python scripts/validate_skill_evals.py > validation-evals.log 2>&1
          status=$?
          cat validation-evals.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload eval validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evals-log
          path: validation-evals.log

      - name: Fail if eval validation failed
        if: steps.validate_evals.outputs.status != '0'
        run: exit ${{ steps.validate_evals.outputs.status }}

      - name: Build portable targets
        run: python scripts/build_skill_targets.py

      - name: Validate generated runtime policy layers
        run: python scripts/validate_runtime_layers.py --generated

      - name: Validate generated context budgets
        run: python scripts/validate_context_budgets.py --generated

      - name: Validate Codex target
        run: python scripts/validate_codex_skill_pack.py

      - name: Validate Claude Code plugin target
        run: python scripts/validate_claude_plugin_target.py

      - name: Full validation orchestrator smoke check
        id: validate_full
        run: |
          set +e
          python scripts/validate_skill_pack.py > validation-full.log 2>&1
          status=$?
          cat validation-full.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload full validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-full-log
          path: validation-full.log

      - name: Fail if full validation failed
        if: steps.validate_full.outputs.status != '0'
        run: exit ${{ steps.validate_full.outputs.status }}
