name: Support question
description: Ask a public installation or usage question that is not a bug or security report.
title: "[Question]: "
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Preliminary checks
      options:
        - label: I searched the README, installation guides, and existing issues.
          required: true
        - label: This question contains no secrets or private project content.
          required: true
  - type: dropdown
    id: client
    attributes:
      label: Client
      options:
        - Codex
        - Claude Code
        - Cursor
        - VS Code Codex
        - VS Code Claude
        - Not client-specific
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WebDev Agent Kit version
      placeholder: v0.4.0
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to accomplish and where you are blocked.
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What you tried
      description: Include relevant commands, paths, and sanitized output.
    validations:
      required: true
