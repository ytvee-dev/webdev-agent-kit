name: Feature request
description: Propose an improvement to an existing supported workflow or public user experience.
title: "[Feature]: "
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Preliminary checks
      options:
        - label: I searched existing issues and ROADMAP.md.
          required: true
        - label: This request describes a user problem, not only a preferred implementation.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Who encounters the problem, and in what recurring workflow?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable success without assuming a specific implementation.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and examples
      description: Provide public reproductions, prompts, client details, or repeated cases.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and compatibility
      description: Note affected clients, stacks, workflows, and important exclusions.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
